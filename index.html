<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Family Academy \u2014 Your Learning Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0c0701;}
#canvas{display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair;}
#vig{position:fixed;inset:0;pointer-events:none;z-index:10;background:radial-gradient(ellipse at 50% 48%,transparent 42%,rgba(3,1,0,.82) 100%);}
#loader{position:fixed;inset:0;z-index:9000;background:radial-gradient(ellipse at 50% 42%,#170c03 0%,#090400 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.6s cubic-bezier(.4,0,.2,1);}
#loader.out{opacity:0;pointer-events:none;}
.ld-ring{width:82px;height:82px;margin-bottom:34px;animation:rp 3s ease-in-out infinite;}
.ld-ring svg{width:100%;height:100%;}
@keyframes rp{0%,100%{filter:drop-shadow(0 0 6px rgba(200,130,30,.18))}50%{filter:drop-shadow(0 0 26px rgba(200,130,30,.55));}}
.ld-name{font-family:'Playfair Display',Georgia,serif;font-size:2.1rem;color:#f0c060;letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px;opacity:0;animation:su .9s .4s forwards;}
.ld-tag{font-family:'Lato',sans-serif;font-weight:300;font-size:.69rem;color:#7a5020;letter-spacing:.62em;text-transform:uppercase;margin-bottom:52px;opacity:0;animation:su .9s .7s forwards;}
.ld-bar-wrap{width:228px;height:1px;background:rgba(200,150,50,.12);}
.ld-bar{height:1px;width:0;background:linear-gradient(90deg,transparent,#b07028,#f0c060,#b07028,transparent);transition:width .07s linear;}
.ld-msg{font-family:'Lato',sans-serif;font-weight:300;font-size:.64rem;color:#5a3810;letter-spacing:.24em;margin-top:16px;opacity:0;animation:su .9s 1s forwards;}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
#toplogo{position:fixed;top:20px;left:24px;z-index:50;font-family:'Playfair Display',Georgia,serif;font-size:.82rem;color:#b08030;letter-spacing:.26em;text-transform:uppercase;opacity:0;transition:opacity .8s;pointer-events:none;display:flex;align-items:center;gap:9px;}
#toplogo .sep{width:1px;height:10px;background:rgba(200,150,50,.28);}
#toplogo .fa{color:#f0c060;}
#toplogo.show{opacity:.72;}
#zone{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:50;font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:.8rem;color:#c8903a;letter-spacing:.36em;text-transform:uppercase;text-shadow:0 0 30px rgba(200,110,20,.44);opacity:0;transition:opacity 1s;pointer-events:none;}
#zone.show{opacity:1;}
#hud{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;background:rgba(5,2,0,.82);border:1px solid rgba(200,150,50,.16);border-radius:40px;padding:7px 22px;font-family:'Lato',sans-serif;font-size:.66rem;font-weight:300;color:#907040;letter-spacing:.16em;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0;transition:opacity .9s;pointer-events:none;}
#hud.show{opacity:1;}
.hk{background:rgba(200,150,50,.1);border:1px solid rgba(200,150,50,.24);border-radius:4px;padding:2px 7px;color:#d0a050;font-size:.63rem;}
.hdot{width:2px;height:2px;border-radius:50%;background:rgba(200,150,50,.26);}
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;width:22px;height:22px;pointer-events:none;opacity:0;transition:opacity .4s;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(210,168,80,.5);border-radius:1px;transition:background .18s,transform .14s;}
#xhair::before{width:1px;height:100%;left:50%;top:0;margin-left:-.5px;}
#xhair::after{width:100%;height:1px;left:0;top:50%;margin-top:-.5px;}
#xhair.show{opacity:1;}
#xhair.hot::before,#xhair.hot::after{background:#f0d060;transform:scale(1.3);}
#tip{position:fixed;z-index:100;padding:5px 14px;background:rgba(5,2,0,.94);border:1px solid rgba(200,150,50,.26);border-radius:22px;font-family:'Lato',sans-serif;font-size:.67rem;font-weight:300;color:#d0a050;letter-spacing:.16em;pointer-events:none;opacity:0;transition:opacity .18s;transform:translateX(-50%);white-space:nowrap;}
#tip.show{opacity:1;}
#intro{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.il{font-family:'Playfair Display',Georgia,serif;color:#f0c060;text-align:center;text-shadow:0 0 70px rgba(220,140,30,.55),0 0 20px rgba(200,130,30,.28);opacity:0;transform:translateY(24px);transition:opacity 1.3s,transform 1.3s;}
.il.show{opacity:1;transform:none;}
.il.gone{opacity:0 !important;transform:translateY(-20px) !important;}
#overlay{position:fixed;inset:0;z-index:600;background:rgba(3,1,0,.88);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#overlay.open{opacity:1;pointer-events:all;}
.book-view{display:flex;max-width:840px;width:95%;max-height:88vh;position:relative;filter:drop-shadow(0 40px 80px rgba(0,0,0,.9));}
.book-spine-side{width:28px;flex-shrink:0;border-radius:4px 0 0 4px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--bsc,#8a3010) 0%,var(--bsc2,#5a1808) 100%);}
.book-spine-side::after{content:attr(data-title);writing-mode:vertical-rl;transform:rotate(180deg);font-family:'Playfair Display',serif;font-size:.58rem;color:rgba(255,235,180,.68);letter-spacing:.18em;text-transform:uppercase;padding:8px 0;}
.book-left{background:linear-gradient(135deg,#1a0f06 0%,#120c04 100%);border-top:1px solid rgba(200,150,50,.2);border-bottom:1px solid rgba(200,150,50,.2);padding:36px 28px 36px 24px;width:210px;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;}
.book-cover-art{width:100%;aspect-ratio:1;border-radius:6px;margin-bottom:18px;background:var(--bsc,#8a3010);display:flex;align-items:center;justify-content:center;font-size:2.4rem;box-shadow:inset 0 0 30px rgba(0,0,0,.5);}
.book-cover-title{font-family:'Playfair Display',serif;font-size:.82rem;color:#f0c070;letter-spacing:.08em;line-height:1.4;margin-bottom:6px;}
.book-cover-sub{font-family:'Lato',sans-serif;font-weight:300;font-size:.62rem;color:#806040;letter-spacing:.18em;text-transform:uppercase;}
.book-cover-brand{font-family:'Lato',sans-serif;font-weight:300;font-size:.58rem;color:#5a3818;letter-spacing:.28em;text-transform:uppercase;margin-top:auto;padding-top:12px;border-top:1px solid rgba(200,150,50,.1);}
.book-right{background:linear-gradient(135deg,#faf5ec 0%,#f4edd8 100%);padding:36px 36px;flex:1;overflow-y:auto;border-radius:0 8px 8px 0;position:relative;}
.book-right::-webkit-scrollbar{width:3px;}
.book-right::-webkit-scrollbar-thumb{background:#c8a878;border-radius:3px;}
.book-page-num{position:absolute;bottom:14px;right:20px;font-family:'Lato',serif;font-size:.62rem;color:rgba(120,90,50,.38);letter-spacing:.12em;}
.book-right h2{font-family:'Playfair Display',serif;font-size:1.42rem;color:#2a1a08;margin-bottom:6px;line-height:1.28;}
.book-right .bsub{font-family:'Lato',sans-serif;font-weight:300;font-size:.7rem;color:#8a6040;letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid rgba(120,90,50,.18);}
.book-right .bbody{font-family:'Lato',sans-serif;font-weight:300;color:#3a2a18;font-size:.88rem;line-height:1.88;}
.book-right .bbody h3{font-family:'Playfair Display',serif;color:#5a3010;font-size:.95rem;margin:20px 0 8px;font-weight:400;}
.book-right .bbody ul{padding-left:1.1em;}
.book-right .bbody li{margin-bottom:7px;}
.book-right .bbody p{margin-bottom:10px;}
.book-right .bbody strong{color:#3a2208;font-weight:400;}
.book-right .bbody em{color:#5a3818;font-style:italic;}
.ocls{position:absolute;top:12px;right:14px;z-index:10;background:rgba(5,2,0,.6);border:1px solid rgba(200,150,50,.22);border-radius:50%;width:28px;height:28px;color:#a07040;font-size:.9rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ocls:hover{background:rgba(200,100,20,.3);color:#f0c060;transform:rotate(90deg);}
.drawer-overlay{background:linear-gradient(148deg,#1e1208 0%,#130c04 100%);border:1px solid rgba(200,150,50,.26);border-radius:16px;padding:36px 42px;max-width:640px;width:92%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 50px 120px rgba(0,0,0,.82),inset 0 1px 0 rgba(200,150,50,.09);}
.drawer-overlay::-webkit-scrollbar{width:3px;}
.drawer-overlay::-webkit-scrollbar-thumb{background:#4a2810;border-radius:3px;}
.dov-tag{font-family:'Lato',sans-serif;font-weight:300;font-size:.62rem;color:#6a4018;letter-spacing:.46em;text-transform:uppercase;margin-bottom:10px;}
.dov-title{font-family:'Playfair Display',Georgia,serif;font-size:1.55rem;color:#f0c060;margin-bottom:5px;line-height:1.22;}
.dov-sub{font-family:'Lato',sans-serif;font-weight:300;font-size:.72rem;color:#7a5530;letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid rgba(200,150,50,.1);}
.dlsec{font-family:'Lato',sans-serif;font-weight:300;font-size:.63rem;color:#c08030;letter-spacing:.36em;text-transform:uppercase;margin:22px 0 11px;display:flex;align-items:center;gap:11px;}
.dlsec::after{content:'';flex:1;height:1px;background:rgba(200,150,50,.14);}
.dlgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.dlbtn{display:flex;align-items:center;gap:9px;padding:11px 13px;background:rgba(200,150,50,.06);border:1px solid rgba(200,150,50,.18);border-radius:10px;color:#b89040;font-family:'Lato',sans-serif;font-weight:300;font-size:.76rem;text-decoration:none;transition:all .22s;cursor:pointer;letter-spacing:.06em;}
.dlbtn:hover{background:rgba(200,150,50,.15);border-color:rgba(200,150,50,.4);color:#f0c060;transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.4);}
.dlicon{font-size:1rem;flex-shrink:0;}
#jpad{position:fixed;bottom:82px;left:28px;z-index:50;width:96px;height:96px;display:none;pointer-events:all;user-select:none;}
@media(max-width:820px){#jpad{display:block;}}
#jbase{width:96px;height:96px;border-radius:50%;position:relative;background:rgba(6,3,1,.55);border:1px solid rgba(200,150,50,.18);backdrop-filter:blur(8px);}
#jknob{width:36px;height:36px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(200,150,50,.32);border:1px solid rgba(200,150,50,.48);}
#hint-arrow{position:fixed;bottom:110px;right:28px;z-index:50;font-family:'Lato',sans-serif;font-weight:300;font-size:.68rem;color:#a07030;letter-spacing:.18em;text-align:right;opacity:0;transition:opacity .8s;pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
#hint-arrow.show{opacity:1;}
#hint-arrow .aline{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,150,50,.5));}
.dev-lbl{position:fixed;top:50%;right:26px;transform:translateY(-50%);z-index:50;font-family:'Lato',sans-serif;font-weight:300;font-size:.6rem;color:#6a4820;letter-spacing:.22em;text-transform:uppercase;opacity:0;transition:opacity .4s;pointer-events:none;text-align:right;}
.dev-lbl.show{opacity:1;}
/* FOCUS BUTTONS */
#focus-btns{position:fixed;right:22px;bottom:80px;z-index:50;display:flex;flex-direction:column;gap:6px;opacity:0;transition:opacity .9s;}
#focus-btns.show{opacity:1;}
.fbn{font-family:'Lato',sans-serif;font-weight:300;font-size:.6rem;color:#907040;letter-spacing:.14em;background:rgba(5,2,0,.72);border:1px solid rgba(200,150,50,.16);border-radius:20px;padding:5px 12px;cursor:pointer;transition:all .2s;white-space:nowrap;text-align:right;}
.fbn:hover{background:rgba(200,100,20,.18);border-color:rgba(200,150,50,.4);color:#f0c060;}
@media(max-width:540px){.book-view{flex-direction:column;max-height:92vh;}.book-left{width:100%;}.book-spine-side{display:none;}.dlgrid{grid-template-columns:1fr;}.drawer-overlay{padding:22px 18px;}}
</style>
</head>

<script type="module">
import * as THREE from 'three';
window._THREE=THREE;

// ====================================================

const BOOKS=[
  {id:'register',spine:'Register',emoji:'\\uD83D\\uDCDD',col:0xb85528,col2:0x7a2e0e,title:'Getting Started',sub:'Create your Family Academy account',body:'<p>Creating an account takes under 90 seconds.</p><h3>Steps</h3><ul><li>Enter your full name, email, and a secure password.</li><li>Select your role: <em>Student</em>, <em>Parent</em>, or <em>Teacher</em>.</li><li>Confirm your email via the verification link.</li><li>Complete your profile and choose your grade.</li></ul><p>Parents can link students after registration. Teachers receive a class code automatically.</p>'},
  {id:'login',spine:'Login',emoji:'\\uD83D\\uDD10',col:0x7045a0,col2:0x3a1e60,title:'Login & Access',sub:'Sign in from any device',body:'<p>Use your email and password. Sessions persist securely across all devices.</p><h3>Login Options</h3><ul><li><strong>Email &amp; Password</strong> &mdash; the default method.</li><li><strong>Google Sign-In</strong> &mdash; one tap access.</li><li><strong>PIN Login</strong> &mdash; quick 4-digit access.</li></ul><h3>Forgot Password?</h3><p>Tap <em>Forgot Password</em>. A reset link arrives within 30 seconds.</p>'},
  {id:'devices',spine:'Devices',emoji:'💻',col:0x226690,col2:0x0e3550,title:'Device Switching',sub:'Seamlessly continue anywhere',body:'<p>Start on your phone, continue on your laptop, finish on the TV &mdash; progress syncs in real time.</p><h3>Platforms</h3><ul><li>Android phones &amp; tablets</li><li>Windows, macOS, Linux desktops</li><li>Android TV &amp; smart TVs</li><li>Web browsers (Chrome, Firefox, Safari)</li></ul><p>Offline work queues and uploads when back online.</p>'},
  {id:'notes',spine:'Notes',emoji:'\\uD83D\\uDCD2',col:0x1f8850,col2:0x0d4a28,title:'Smart Notes',sub:'Capture, organise, review',body:'<p>Notes anchor to the exact video second, so context is never lost.</p><h3>Features</h3><ul><li>Rich text &mdash; bold, italic, code blocks, LaTeX.</li><li><strong>Timestamp links</strong> &mdash; tap a note to jump to that video moment.</li><li>Tag and search by topic or date.</li><li>Export as PDF or share with a teacher.</li><li>AI-powered note summary (beta).</li></ul>'},
  {id:'video',spine:'Videos',emoji:'\\uD83C\\uDFAC',col:0xa02828,col2:0x5a1010,title:'Video Playback',sub:'Lessons, lectures & live sessions',body:'<p>Adaptive HD streaming adjusts quality automatically.</p><h3>Playback Features</h3><ul><li>Speed control: 0.5x to 2x.</li><li>Auto-generated captions with highlight-sync.</li><li>Picture-in-picture on desktop.</li><li>Chapter navigation and bookmarks.</li><li>Offline download for premium subscribers.</li></ul>'},
  {id:'practice',spine:'Practice',emoji:'\\u270F\\uFE0F',col:0xc86818,col2:0x7a3a08,title:'Practice Questions',sub:'Sharpen your skills daily',body:'<p>Thousands of curriculum-aligned questions, auto-graded with explanations.</p><h3>Question Types</h3><ul><li>Multiple choice with instant feedback.</li><li>Fill-in-the-blank with smart matching.</li><li>Diagram labelling.</li><li>Short-answer with AI rubric scoring.</li></ul><h3>Spaced Repetition</h3><p>Our algorithm re-surfaces questions at the optimal interval to cement long-term memory.</p>'},
  {id:'exams',spine:'Exams',emoji:'\\uD83D\\uDCCB',col:0x18407a,col2:0x0a1e40,title:'Exams & Assessments',sub:'Timed tests, mocks & certificates',body:'<p>Full mock exams with real-world timing build confidence before test day.</p><h3>Exam Modes</h3><ul><li><strong>Practice Mode</strong> &mdash; no time limit, hints allowed.</li><li><strong>Exam Mode</strong> &mdash; strict timer, auto-submit.</li><li><strong>Review Mode</strong> &mdash; full explanations after submission.</li></ul><h3>Certificates</h3><p>Earn verifiable digital certificates. Share to LinkedIn or print.</p>'},
  {id:'progress',spine:'Progress',emoji:'\\uD83D\\uDCC8',col:0x4a9020,col2:0x244a0e,title:'Progress Tracking',sub:'See exactly where you stand',body:'<p>Visual dashboards show mastery by topic, time invested, and improvement over weeks.</p><h3>What We Track</h3><ul><li>Lesson completion by chapter.</li><li>Average quiz and exam scores with trendlines.</li><li>Time-on-task per subject per week.</li><li>Weak topics flagged and prioritised.</li></ul>'},

function rnd(a,b){return a+(b-a)*Math.random();}
function ri(a,b){return Math.floor(rnd(a,b+1));}
function makeTex(w,h,fn,rep){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  fn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;
  if(rep){t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rep[0],rep[1]);}
  return t;
}
function mesh(geo,mat){const m=new THREE.Mesh(geo,mat);m.castShadow=true;m.receiveShadow=true;return m;}
function box(w,h,d,mat){return mesh(new THREE.BoxGeometry(w,h,d),mat);}
function cyl(rt,rb,h,s,mat){return mesh(new THREE.CylinderGeometry(rt,rb,h,s),mat);}
function sph(r,s,mat){return mesh(new THREE.SphereGeometry(r,s,s),mat);}
function place(o,x,y,z){o.position.set(x,y,z);return o;}
function add(...os){os.forEach(o=>scene.add(o));return os[os.length-1];}
function h2rgb(h){return{r:(h>>16)&255,g:(h>>8)&255,b:h&255};}
function hrgb(h){const{r,g,b}=h2rgb(h);return 'rgb('+r+','+g+','+b+')';}

const floorTex=makeTex(1024,1024,(ctx,W,H)=>{
  ctx.fillStyle='#3a2206';ctx.fillRect(0,0,W,H);
  const pH=128;
  for(let r=0;r<H/pH;r++){
    const off=(r%2)*165;
    for(let px=off-20;px<W+220;px+=ri(175,255)+2){
      const v=ri(0,22);ctx.fillStyle='rgb('+(50+v)+','+(26+v)+','+(7+v)+')';
      ctx.fillRect(px,r*pH,ri(175,255),pH-1);
      ctx.strokeStyle='rgba('+(18+v)+','+(8+v)+',0,.14)';
      for(let g2=0;g2<6;g2++){ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(px+rnd(0,200),r*pH);ctx.lineTo(px+rnd(0,200),(r+1)*pH);ctx.stroke();}
    }
    ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(0,(r+1)*pH-1,W,2);
  }
},[4,4]);

function makeSpineTex(bk){
  return makeTex(72,320,(ctx,W,H)=>{
    const{r,g,b}=h2rgb(bk.col),{r:r2,g:g2,b:b2}=h2rgb(bk.col2);
    const bg=ctx.createLinearGradient(0,0,W,0);
    bg.addColorStop(0,'rgb('+r2+','+g2+','+b2+')');bg.addColorStop(.35,'rgb('+r+','+g+','+b+')');
    bg.addColorStop(.72,'rgb('+Math.min(r*1.18,255|0)+','+Math.min(g*1.18,255|0)+','+Math.min(b*1.18,255|0)+')');bg.addColorStop(1,'rgb('+r2+','+g2+','+b2+')');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let i=0;i<1800;i++){ctx.fillStyle='rgba(255,255,255,.02)';ctx.fillRect(rnd(0,W),rnd(0,H),1,rnd(1,4));}
    ctx.fillStyle='rgba(255,210,60,.65)';ctx.fillRect(2,5,W-4,4);ctx.fillRect(2,H-9,W-4,4);
    ctx.fillStyle='rgba(255,210,60,.25)';ctx.fillRect(2,H*.38,W-4,2);ctx.fillRect(2,H*.62,W-4,2);
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-Math.PI/2);
    const fs=bk.spine.length>7?10:12;ctx.font='bold '+fs+'px Georgia,serif';
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.55)';ctx.shadowBlur=3;
    ctx.fillText(bk.spine.toUpperCase(),1,1);ctx.fillStyle='rgba(255,245,200,.96)';ctx.fillText(bk.spine.toUpperCase(),0,0);
    ctx.restore();
    ctx.save();ctx.translate(W/2,H*.82);ctx.rotate(-Math.PI/2);ctx.font='7px Lato,sans-serif';ctx.fillStyle='rgba(255,235,160,.42)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('FAMILY ACADEMY',0,0);ctx.restore();
  });
}

function doMove(){
  const dir=new THREE.Vector3(Math.sin(cYaw),0,Math.cos(cYaw));const right=new THREE.Vector3(Math.cos(cYaw),0,-Math.sin(cYaw));
  const anyKey=keys.KeyW||keys.KeyS||keys.KeyA||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight;
  if(anyKey||(jActive&&(Math.abs(jDX)>4||Math.abs(jDY)>4))){const hEl=document.getElementById('hint-arrow');if(hEl.classList.contains('show'))hEl.classList.remove('show');}
  if(keys.KeyW||keys.ArrowUp)tPos.addScaledVector(dir,-MOVE);if(keys.KeyS||keys.ArrowDown)tPos.addScaledVector(dir,MOVE);
  if(keys.KeyA||keys.ArrowLeft)tPos.addScaledVector(right,-MOVE);if(keys.KeyD||keys.ArrowRight)tPos.addScaledVector(right,MOVE);
  if(jActive&&(Math.abs(jDX)>4||Math.abs(jDY)>4)){tPos.addScaledVector(right,jDX/JR*MOVE);tPos.addScaledVector(dir,jDY/JR*MOVE);}
  tPos.x=Math.max(BOUNDS.xMin,Math.min(BOUNDS.xMax,tPos.x));tPos.z=Math.max(BOUNDS.zMin,Math.min(BOUNDS.zMax,tPos.z));tPos.y=1.62;
  // flyTo from focus buttons
  if(window._flyTarget){tPos.lerp(window._flyTarget,.15);if(tPos.distanceTo(window._flyTarget)<.08)window._flyTarget=null;}
}

// ====================================================
//  RAYCASTER
// ====================================================
const ray=new THREE.Raycaster();const mouse2=new THREE.Vector2();
const tipEl=document.getElementById('tip');const xhairEl=document.getElementById('xhair');
let hovMesh=null;
function allHotMeshes(){return allHotspots.map(h=>h.mesh);}
function castAt(cx,cy){mouse2.x=(cx/window.innerWidth)*2-1;mouse2.y=-(cy/window.innerHeight)*2+1;ray.setFromCamera(mouse2,camera);return ray.intersectObjects(allHotMeshes(),false);}
canvas.addEventListener('pointermove',e=>{
  if(drag)return;const hits=castAt(e.clientX,e.clientY);
  if(hits.length){hovMesh=hits[0].object;const hs=allHotspots.find(h=>h.mesh===hovMesh);const lbl=hs?hs.label:(hovMesh.userData.label||'');tipEl.textContent=lbl;tipEl.style.left=e.clientX+'px';tipEl.style.top=(e.clientY-44)+'px';tipEl.classList.add('show');xhairEl.classList.add('hot');canvas.style.cursor='pointer';}
  else{hovMesh=null;tipEl.classList.remove('show');xhairEl.classList.remove('hot');canvas.style.cursor=drag?'none':'crosshair';}
});
canvas.addEventListener('click',e=>{
  if(dragMoved)return;const hits=castAt(e.clientX,e.clientY);if(!hits.length)return;const m=hits[0].object;
  if(m.userData.isBook)openBook(m.userData.bookId);
  else if(m.userData.isDrawer)openDrawer(m.userData.drawerIndex);
  else if(m.userData.isDevice)cycleDevice(m.userData.isDevice);
});
canvas.addEventListener('touchend',e=>{
  if(touchMoved)return;const t=e.changedTouches[0];const hits=castAt(t.clientX,t.clientY);if(!hits.length)return;const m=hits[0].object;
  if(m.userData.isBook)openBook(m.userData.bookId);
  else if(m.userData.isDrawer)openDrawer(m.userData.drawerIndex);
  else if(m.userData.isDevice)cycleDevice(m.userData.isDevice);
},{passive:true});

// ====================================================
//  DEVICE CYCLING
// ====================================================
const devLblEl=document.getElementById('dev-lbl');let devLblTimer=null;
function showDevLbl(){devLblEl.classList.add('show');clearTimeout(devLblTimer);devLblTimer=setTimeout(()=>devLblEl.classList.remove('show'),2500);}
function cycleDevice(dev){
  if(dev==='laptop'){lapState=(lapState+1)%LAP_STATES.length;reDraw(lapTex,drawLapTex);}
  else if(dev==='tv'){tvState=(tvState+1)%TV_STATES.length;reDraw(tvTex,drawTvTex);}
  else if(dev==='phone'){phState=(phState+1)%PH_STATES.length;reDraw(phTex,drawPhTex);}
  showDevLbl();
}
function reDraw(tex,drawFn){const c=document.createElement('canvas');c.width=tex.image.width;c.height=tex.image.height;drawFn(c.getContext('2d'),c.width,c.height);tex.image=c;tex.needsUpdate=true;}

// ====================================================
//  BOOK OVERLAY (book-style open view)
// ====================================================
function openBook(id){
  const bk=BOOKS.find(b=>b.id===id);if(!bk)return;
  const css=hrgb(bk.col),css2=hrgb(bk.col2);
  overlay.innerHTML='<div class="book-view" style="--bsc:'+css+';--bsc2:'+css2+'"><div class="book-spine-side" data-title="'+bk.title+'"></div><div class="book-left"><div><div class="book-cover-art">'+bk.emoji+'</div><div class="book-cover-title">'+bk.title+'</div><div class="book-cover-sub">'+bk.sub+'</div></div><div class="book-cover-brand">Family Academy</div></div><div class="book-right"><button class="ocls" id="ocls">&#x2715;</button><h2>'+bk.title+'</h2><div class="bsub">'+bk.sub+'</div><div class="bbody">'+bk.body+'</div><div class="book-page-num">Family Academy &mdash; '+bk.spine+'</div></div></div>';
  overlay.classList.add('open');
  document.getElementById('ocls').addEventListener('click',closeOverlay);
}

// ====================================================
//  DRAWER OVERLAY
// ====================================================
function openDrawer(idx){
  const dl=window.FA_DOWNLOADS;
  const client=dl.client||{};
  const tv=dl.tv||{};
  const cats=[
    {title:'Client Apps',sub:'Desktop, laptop, and mobile installers',tag:'Downloads \u00b7 Client',sections:[
      {label:'Desktop & Laptop',items:[client.windows_installer,client.windows_zip,client.macos_zip,client.linux_tar]},
      {label:'Android & Mobile',items:[client.android_apk,client.play_store_aab]}
    ]},
    {title:'TV Apps',sub:'Big screen and smart TV builds',tag:'Downloads \u00b7 TV',sections:[
      {label:'Android TV Packages',items:[tv.android_tv_apk,tv.tv_aab,tv.tv_linux,tv.tv_macos]}
    ]},
    {title:'Guides & Support',sub:'Setup docs and help guides',tag:'Downloads \u00b7 Guides',sections:[
      {label:'Quick Setup',items:[
        {label:'Getting Started Guide',icon:'📋',url:'#',action:'book',bookId:'register'},
        {label:'Device Pairing Tutorial',icon:'📱',url:'#',action:'book',bookId:'devices'},
        {label:'Parent Link Guide',icon:'👨\u200D👩\u200D👦',url:'#',action:'book',bookId:'parents'},
        {label:'TV Setup Guide',icon:'📺',url:'#',action:'book',bookId:'tv'}
      ]}
    ]}
  ][idx];
  let h='<div class="drawer-overlay"><button class="ocls" id="ocls">&#x2715;</button><div class="dov-tag">'+cats.tag+'</div><div class="dov-title">'+cats.title+'</div><div class="dov-sub">'+cats.sub+'</div>';
  cats.sections.forEach(s=>{
    h+='<div class="dlsec">'+s.label+'</div><div class="dlgrid">';
    s.items.filter(Boolean).forEach(d=>{
      const url=d.url||'#';
      const icon=d.icon||'⬇';
      const label=d.label||'Open';
      if(d.action==='book' && d.bookId){
        h+='<button type="button" class="dlbtn" data-guide-book="'+d.bookId+'"><span class="dlicon">'+icon+'</span>'+label+'</button>';
      } else {
        h+='<a href="'+url+'" class="dlbtn" target="_blank" rel="noopener"><span class="dlicon">'+icon+'</span>'+label+'</a>';
      }
    });
    h+='</div>';
  });
  h+='</div>';overlay.innerHTML=h;overlay.classList.add('open');
  document.getElementById('ocls').addEventListener('click',closeOverlay);
  overlay.querySelectorAll('[data-guide-book]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const bookId=btn.getAttribute('data-guide-book');
      closeOverlay();
      if(bookId)openBook(bookId);
    });
  });
  // Animate drawer physically
  drawerOpen[idx]=!drawerOpen[idx];
}
function closeOverlay(){overlay.classList.remove('open');}
overlay.addEventListener('click',e=>{if(e.target===overlay)closeOverlay();});
document.addEventListener('keydown',e=>{if(e.code==='Escape')closeOverlay();});

// flyTo from global focus buttons
window.flyTo=function(zone){const zones={desk:[-1.2,1.55,-1.6],shelf:[-4.5,1.55,-5.5],tv:[3.2,1.55,-5.0],files:[0.2,1.55,-5.8]};const t=zones[zone];if(t){window._flyTarget=new THREE.Vector3(t[0],t[1],t[2]);}};

// ====================================================
//  ZONES
// ====================================================
const ZONES=[{maxZ:7,label:''},{maxZ:4.0,label:'The Entrance'},{maxZ:.6,label:'Study Desk'},{maxZ:-3,label:'The Bookshelves'},{maxZ:-5,label:'TV Corner'},{maxZ:-9,label:'Files & Support'}];
let curZone='';const zoneEl=document.getElementById('zone');let zoneTimer=null;
function checkZone(){const z=cPos.z;let label='';for(const zn of ZONES){if(z<zn.maxZ)label=zn.label;}if(label!==curZone){curZone=label;clearTimeout(zoneTimer);zoneEl.classList.remove('show');if(label){setTimeout(()=>{zoneEl.textContent=label;zoneEl.classList.add('show');},320);zoneTimer=setTimeout(()=>zoneEl.classList.remove('show'),3400);}}}

// ====================================================
//  CINEMATIC INTRO
// ====================================================
let introT=0;const INTRO_DUR=5.5;let introActive=true,introPhase=0;
const il1=document.getElementById('il1'),il2=document.getElementById('il2');
function eO4(p){return 1-Math.pow(1-p,4);}function eO2(p){return 1-Math.pow(1-p,2);}
function stepIntro(dt){
  introT+=dt;const p=Math.min(introT/INTRO_DUR,1);
  const p1=Math.min(p/.4,1),p2=Math.max((p-.4)/.6,0);const e1=eO2(p1),e2=eO4(p2);
  if(p<.4){tPos.x=2.5*(1-e1);tPos.z=9.0+(7.5-9.0)*e1;tPos.y=2.4+(1.9-2.4)*e1;tYaw=(Math.PI-.35)+.2*e1;tPitch=-.14+.08*e1;}
  else{tPos.x=0;tPos.z=7.5+(6.0-7.5)*e2;tPos.y=1.9+(1.62-1.9)*e2;tYaw=(Math.PI-.15)+.15*e2;tPitch=-.06+.03*e2;}
  if(introT>.55&&introPhase===0){introPhase=1;il1.classList.add('show');il2.classList.add('show');}
  if(introT>3.4&&introPhase===1){introPhase=2;il1.classList.add('gone');il2.classList.add('gone');}
  if(introT>=INTRO_DUR){
    introActive=false;tPos.set(0,1.62,6.0);tYaw=Math.PI;tPitch=-.03;
    document.getElementById('hud').classList.add('show');document.getElementById('toplogo').classList.add('show');xhairEl.classList.add('show');
    document.getElementById('focus-btns').classList.add('show');
    const hintEl=document.getElementById('hint-arrow');hintEl.classList.add('show');setTimeout(()=>hintEl.classList.remove('show'),9000);
  }
}

// ====================================================
//  ANIMATIONS
// ====================================================
function animParticles(t){
  const pos=pGeo.attributes.position.array;
  for(let i=0;i<PCOUNT;i++){pos[i*3]+=pVel[i*3]+Math.sin(t*.18+i*.48)*.0003;pos[i*3+1]+=pVel[i*3+1];pos[i*3+2]+=pVel[i*3+2]+Math.cos(t*.14+i*.38)*.00022;if(pos[i*3+1]>3.4){pos[i*3+1]=.1;pos[i*3]=rnd(-5,5);pos[i*3+2]=rnd(-7,6.5);}if(pos[i*3]<-5.5||pos[i*3]>5.5)pVel[i*3]*=-1;}
  pGeo.attributes.position.needsUpdate=true;
}
function animLights(t){
  deskPt.intensity=1.88+Math.sin(t*1.1)*.14;tvPt.intensity=.72+Math.sin(t*.7)*.12;
  bedPt.intensity=.92+Math.sin(t*1.6)*.08;mainPt.intensity=2.1+Math.sin(t*.4)*.07;
  deskPend.intensity=.88+Math.sin(t*.95+.8)*.1;dlPt.intensity=.58+Math.sin(t*2.2)*.32;
  doorPt.intensity=.42+Math.sin(t*.6+1.2)*.1;flPt.intensity=.72+Math.sin(t*1.4+.5)*.1;
  shelfPt.intensity=1.05+Math.sin(t*.55+.3)*.12;winDir.intensity=.58+Math.sin(t*.22)*.09;
  const now=new Date();const hr=now.getHours()%12+now.getMinutes()/60;const mn=now.getMinutes()+now.getSeconds()/60;const sc=now.getSeconds()+now.getMilliseconds()/1000;
  hrHand.rotation.z=-(hr/12)*Math.PI*2;mnHand.rotation.z=-(mn/60)*Math.PI*2;scHand.rotation.z=-(sc/60)*Math.PI*2;
}
function animStudent(t){
  if(!SG)return;
  // Subtle breathing: torso very slightly scales on Y
  const breathe=Math.sin(t*.8)*.004;
  SG.children[0].scale.y=1+breathe;
  // Head micro-nod (reading)
  if(headG){
    headG.rotation.x=.42+Math.sin(t*.3)*.018;
    headG.rotation.z=Math.sin(t*.25)*.012;
  }
}
function animBooks(t){
  allBookMeshes.forEach(m=>{const isHov=(m===hovMesh);m.position.z+=(isHov?.07:0-m.position.z)*.14;const ts=isHov?1.035:1.0;m.scale.y+=(ts-m.scale.y)*.1;});
}
function animDrawers(){
  drawerGroups.forEach((dg,i)=>{const targetZ=drawerOpen[i]?.38:0;drawerCurZ[i]+=(targetZ-drawerCurZ[i])*.12;dg.position.z=drawerCurZ[i];});
}

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

// ====================================================
//  RENDER LOOP
// ====================================================
let lastT=0;
function render(now){
  requestAnimationFrame(render);const dt=Math.min((now-lastT)/1000,.05);lastT=now;const t=now*.001;
  if(introActive)stepIntro(dt);else doMove();
  cPos.lerp(tPos,.09);cYaw+=(tYaw-cYaw)*.1;cPitch+=(tPitch-cPitch)*.1;
  const moving=!introActive&&(keys.KeyW||keys.KeyS||keys.KeyA||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight||(jActive&&(Math.abs(jDX)>4||Math.abs(jDY)>4)));
  camera.position.copy(cPos);camera.position.y+=moving?Math.sin(t*5.2)*.013:0;
  const cp=Math.cos(cPitch);camera.lookAt(cPos.x+Math.sin(cYaw)*cp,cPos.y+Math.sin(cPitch),cPos.z+Math.cos(cYaw)*cp);
  animParticles(t);animLights(t);animBooks(t);animDrawers();animStudent(t);checkZone();
  scene.fog.density=.021+cPos.distanceTo(tPos)*.004;
  renderer.render(scene,camera);
}

// ====================================================
//  LOADER
// ====================================================
const ldBar=document.getElementById('ld-bar'),ldMsg=document.getElementById('ld-msg');
const msgs=['Preparing your room\\u2026','Placing the books\\u2026','Warming the lights\\u2026','Almost there\\u2026'];
let lp=0,lmi=0;
const ldi=setInterval(()=>{
  lp=Math.min(lp+rnd(2,14),100);ldBar.style.width=lp+'%';
  if(lp>22&&lmi<1){lmi=1;ldMsg.textContent=msgs[1];}if(lp>52&&lmi<2){lmi=2;ldMsg.textContent=msgs[2];}if(lp>80&&lmi<3){lmi=3;ldMsg.textContent=msgs[3];}
  if(lp>=100){clearInterval(ldi);setTimeout(()=>{document.getElementById('loader').classList.add('out');setTimeout(()=>document.getElementById('loader').style.display='none',1700);},380);}
},72);
requestAnimationFrame(render);
</script>
