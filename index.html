// ====================================================
//  RENDERER
// ====================================================
const canvas=document.getElementById('canvas');
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||(window.innerWidth<900&&'ontouchstart' in window);
const renderer=new THREE.WebGLRenderer({canvas,antialias:!isMobile,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,isMobile?1.25:1.8));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=!isMobile; // shadow mapping is the single biggest GPU cost in this scene — off on mobile
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.08;
renderer.outputEncoding=THREE.sRGBEncoding;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0f0700);
scene.fog=new THREE.FogExp2(0x0e0600,.021);
const camera=new THREE.PerspectiveCamera(58,window.innerWidth/window.innerHeight,.04,55);
camera.position.set(0,1.62,5.8);

// ====================================================
//  HELPERS
// ====================================================
function rnd(a,b){return a+(b-a)*Math.random();}
function ri(a,b){return Math.floor(rnd(a,b+1));}
function makeTex(w,h,fn,rep){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  fn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;
  if(rep){t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rep[0],rep[1]);}
  return t;
}
function mesh(geo,mat){const m=new THREE.Mesh(geo,mat);m.castShadow=true;m.receiveShadow=true;return m;}
function box(w,h,d,mat){return mesh(new THREE.BoxGeometry(w,h,d),mat);}
function cyl(rt,rb,h,s,mat){return mesh(new THREE.CylinderGeometry(rt,rb,h,s),mat);}
function sph(r,s,mat){return mesh(new THREE.SphereGeometry(r,s,s),mat);}
function place(o,x,y,z){o.position.set(x,y,z);return o;}
function add(...os){os.forEach(o=>scene.add(o));return os[os.length-1];}
function h2rgb(h){return{r:(h>>16)&255,g:(h>>8)&255,b:h&255};}
function hrgb(h){const{r,g,b}=h2rgb(h);return 'rgb('+r+','+g+','+b+')';}

// ====================================================
//  TEXTURES
// ====================================================
const floorTex=makeTex(1024,1024,(ctx,W,H)=>{
  ctx.fillStyle='#3a2206';ctx.fillRect(0,0,W,H);
  const pH=128;
  for(let r=0;r<H/pH;r++){
    const off=(r%2)*165;
    for(let px=off-20;px<W+220;px+=ri(175,255)+2){
      const v=ri(0,22);ctx.fillStyle='rgb('+(50+v)+','+(26+v)+','+(7+v)+')';
      ctx.fillRect(px,r*pH,ri(175,255),pH-1);
      ctx.strokeStyle='rgba('+(18+v)+','+(8+v)+',0,.14)';
      for(let g2=0;g2<6;g2++){ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(px+rnd(0,200),r*pH);ctx.lineTo(px+rnd(0,200),(r+1)*pH);ctx.stroke();}
    }
    ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(0,(r+1)*pH-1,W,2);
  }
},[4,4]);
const wallTex=makeTex(512,512,(ctx,W,H)=>{
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#c1986c');g.addColorStop(.45,'#ba9266');g.addColorStop(1,'#c1986c');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<4200;i++){const x=rnd(0,W),y=rnd(0,H),v=Math.random()>.5?9:-9;ctx.fillStyle='rgba('+(172+v)+','+(136+v)+','+(92+v)+',.036)';ctx.beginPath();ctx.arc(x,y,rnd(.2,1.1),0,Math.PI*2);ctx.fill();}
},[2,1.4]);
const ceilTex=makeTex(512,512,(ctx,W,H)=>{ctx.fillStyle='#ede5d2';ctx.fillRect(0,0,W,H);for(let i=0;i<800;i++){ctx.fillStyle='rgba(178,160,125,.024)';ctx.fillRect(rnd(0,W),rnd(0,H),rnd(.5,2.5),rnd(.5,2.5));}},[3,3]);
const woodTex=makeTex(512,512,(ctx,W,H)=>{
  const g=ctx.createLinearGradient(0,0,W,H*.35);g.addColorStop(0,'#7e4e1e');g.addColorStop(.5,'#8e5a2a');g.addColorStop(1,'#6c4016');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(36,14,2,.2)';
  for(let i=0;i<26;i++){ctx.lineWidth=rnd(.3,1.6);ctx.beginPath();ctx.moveTo(0,i*21+rnd(-4,4));ctx.lineTo(W,i*21+rnd(-5,5));ctx.stroke();}
},[2,2]);
const dkWoodTex=makeTex(256,256,(ctx,W,H)=>{ctx.fillStyle='#2a1606';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(54,20,4,.36)';for(let i=0;i<22;i++){ctx.lineWidth=rnd(.2,1.1);ctx.beginPath();ctx.moveTo(0,i*13);ctx.lineTo(W,i*13+rnd(-2,2));ctx.stroke();}},[2,2]);

function makeSpineTex(bk){
  return makeTex(72,320,(ctx,W,H)=>{
    const{r,g,b}=h2rgb(bk.col),{r:r2,g:g2,b:b2}=h2rgb(bk.col2);
    const bg=ctx.createLinearGradient(0,0,W,0);
    bg.addColorStop(0,'rgb('+r2+','+g2+','+b2+')');bg.addColorStop(.35,'rgb('+r+','+g+','+b+')');
    bg.addColorStop(.72,'rgb('+Math.min(r*1.18,255|0)+','+Math.min(g*1.18,255|0)+','+Math.min(b*1.18,255|0)+')');bg.addColorStop(1,'rgb('+r2+','+g2+','+b2+')');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let i=0;i<1800;i++){ctx.fillStyle='rgba(255,255,255,.02)';ctx.fillRect(rnd(0,W),rnd(0,H),1,rnd(1,4));}
    ctx.fillStyle='rgba(255,210,60,.65)';ctx.fillRect(2,5,W-4,4);ctx.fillRect(2,H-9,W-4,4);
    ctx.fillStyle='rgba(255,210,60,.25)';ctx.fillRect(2,H*.38,W-4,2);ctx.fillRect(2,H*.62,W-4,2);
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-Math.PI/2);
    const fs=bk.spine.length>7?10:12;ctx.font='bold '+fs+'px Georgia,serif';
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.55)';ctx.shadowBlur=3;
    ctx.fillText(bk.spine.toUpperCase(),1,1);ctx.fillStyle='rgba(255,245,200,.96)';ctx.fillText(bk.spine.toUpperCase(),0,0);
    ctx.restore();
    ctx.save();ctx.translate(W/2,H*.82);ctx.rotate(-Math.PI/2);ctx.font='7px Lato,sans-serif';ctx.fillStyle='rgba(255,235,160,.42)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('FAMILY ACADEMY',0,0);ctx.restore();
  });
}

// ============================================================
// STUDENT — a real rigged human model (glTF, Ready Player Me export) supplied
// by the user, loaded instead of hand-built primitives. It ships in a neutral
// A-pose with no animations, so the hip/knee/elbow/spine joints are bent into
// a seated pose here, using the model's own bone lengths (not guessed numbers).
// ============================================================
let studentModel=null;
const gltfLoader=new GLTFLoader();
// Rotates a bone by `angle` around a *world*-space axis, correctly, even when
// its parent bone has already been rotated (THREE.Object3D.rotateOnWorldAxis
// is documented to only work correctly on an unrotated parent, which breaks
// down the moment we rotate the knee after already rotating its parent, the thigh).
function rotateWorldAxis(obj,axis,angle){
  obj.updateWorldMatrix(true,false);
  const parentWorldQuat=new THREE.Quaternion();
  if(obj.parent)obj.parent.getWorldQuaternion(parentWorldQuat);else parentWorldQuat.identity();
  const worldQuat=new THREE.Quaternion();obj.getWorldQuaternion(worldQuat);
  const deltaQuat=new THREE.Quaternion().setFromAxisAngle(axis,angle);
  const newWorldQuat=deltaQuat.multiply(worldQuat);
  obj.quaternion.copy(parentWorldQuat.clone().invert().multiply(newWorldQuat));
}
gltfLoader.load('./assets/models/student.glb',(gltf)=>{
  const model=gltf.scene;
  model.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
  const bone=n=>model.getObjectByName(n);
  const AX=new THREE.Vector3(1,0,0);
  let thighLen=0;
  // Bend both legs from hanging straight down to a seated position: thigh swings
  // forward to horizontal, then the knee bends back so the shin returns to vertical —
  // net rotation on the shin is zero relative to world, so the lower leg still points
  // straight down and the foot lands close to its original standing floor height.
  ['Left','Right'].forEach(side=>{
    const upLeg=bone(side+'UpLeg'),leg=bone(side+'Leg'),foreArm=bone(side+'ForeArm');
    if(upLeg&&leg){
      thighLen=leg.position.length();
      rotateWorldAxis(upLeg,AX,-Math.PI/2);
      rotateWorldAxis(leg,AX,Math.PI/2);
    }
    if(foreArm)rotateWorldAxis(foreArm,AX,-Math.PI*.24); // elbow bends forward so the hands stay near the desk
  });
  // The hip bend above pivots the knee, not the pelvis — the pelvis itself has to be
  // lowered onto the chair by exactly the thigh length, since the thigh no longer
  // contributes any vertical height once it's horizontal.
  const hips=bone('Hips');
  if(hips&&thighLen)hips.position.y-=thighLen;
  const spine2=bone('Spine2');if(spine2)rotateWorldAxis(spine2,AX,.12); // slight forward lean, studying posture
  const head=bone('Head');if(head)rotateWorldAxis(head,AX,.08); // faint downward gaze toward the desk

  const wrap=new THREE.Group();
  wrap.add(model);
  wrap.position.set(0,0,1.02); // chair seat position (matches CX,CZ below) — seat height is handled by the hip bend above
  wrap.rotation.y=Math.PI;     // the model's bind pose faces +Z; the desk sits at lower z, so flip to face it
  deskGroup.add(wrap);
  studentModel=wrap;
},undefined,(err)=>{console.warn('Student model failed to load:',err);});

function makePosterTex(lines,W,H,bg){
  return makeTex(W,H,(ctx,_W,_H)=>{
    ctx.fillStyle=bg;ctx.fillRect(0,0,_W,_H);
    for(let i=0;i<600;i++){ctx.fillStyle='rgba(255,255,255,.011)';ctx.fillRect(rnd(0,_W),rnd(0,_H),rnd(.5,2.2),rnd(.5,2.2));}
    const glow=ctx.createRadialGradient(_W/2,_H*.5,10,_W/2,_H*.5,_H*.62);
    glow.addColorStop(0,'rgba(255,225,150,.10)');glow.addColorStop(1,'rgba(255,225,150,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,_W,_H);
    ctx.strokeStyle='rgba(200,160,60,.28)';ctx.lineWidth=6;ctx.strokeRect(8,8,_W-16,_H-16);
    ctx.strokeStyle='rgba(200,160,60,.1)';ctx.lineWidth=2;ctx.strokeRect(16,16,_W-32,_H-32);
    lines.forEach(l=>{
      ctx.font=l.font;
      ctx.fillStyle=l.color;
      ctx.textAlign=l.align||'center';
      ctx.shadowColor='rgba(0,0,0,.85)';
      ctx.shadowBlur=l.shadow||10;
      ctx.fillText(l.text,_W/2+(l.dx||0),l.y);
      ctx.shadowBlur=0;
      ctx.fillText(l.text,_W/2+(l.dx||0),l.y);
    });
    ctx.shadowBlur=0;
  });
}

function makePortraitTex(name,quote,W,H,ac){
  return makeTex(W,H,(ctx,_W,_H)=>{
    ctx.fillStyle='#0a0804';ctx.fillRect(0,0,_W,_H);
    const vg=ctx.createRadialGradient(_W*.5,_H*.38,10,_W*.5,_H*.38,_H*.45);
    vg.addColorStop(0,'rgba('+ac+')');vg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=vg;ctx.fillRect(0,0,_W,_H);
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.arc(_W/2,_H*.35,_H*.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(250,215,120,.96)';ctx.font='bold 22px Georgia,serif';ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=8;ctx.fillText(name,_W/2,_H*.64);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(200,160,60,.4)';ctx.fillRect(_W*.15,_H*.68,_W*.7,1.5);
    quote.split('\\n').forEach((ql,qi)=>{ctx.fillStyle='rgba(220,198,150,.82)';ctx.font='italic 14px Georgia,serif';ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=5;ctx.fillText(ql,_W/2,_H*.74+qi*20);ctx.shadowBlur=0;});
    ctx.strokeStyle='rgba(200,150,50,.35)';ctx.lineWidth=5;ctx.strokeRect(6,6,_W-12,_H-12);
  });
}

  clearSweep();
  idx=Math.max(0,Math.min(TOUR.length-1,idx));
  tourIndex=idx;const s=TOUR[idx];
  if(overlay.classList.contains('open'))closeOverlay();
  window._flyTarget=new THREE.Vector3(s.pos[0],s.pos[1],s.pos[2]);
  if(s.focus){const a=angleTo(s.pos,s.focus);tYaw=a.yaw;tPitch=a.pitch;}
  else if(typeof s.yaw==='number'){tYaw=s.yaw;tPitch=typeof s.pitch==='number'?s.pitch:tPitch;}
  if(s.sweep&&s.sweep.length){
    let si=0;
    sweepTimer=setInterval(()=>{
      si=(si+1)%s.sweep.length;
      const a=angleTo(s.pos,s.sweep[si]);tYaw=a.yaw;tPitch=a.pitch;
    },1600);
  }
  tourKickerEl.textContent=s.text.kicker||'';
  tourTitleEl.textContent=s.text.title||'';
  tourCopyEl.textContent=s.text.copy||'';
  tourBulletsEl.innerHTML=(s.text.bullets||[]).map(b=>'<li>'+b+'</li>').join('');
  tourProgressEl.textContent=String(idx+1).padStart(2,'0')+' / '+String(TOUR.length).padStart(2,'0');
  tourChipsEl.querySelectorAll('.tour-chip').forEach((c,i)=>c.classList.toggle('active',i===idx));
  if(!opts.silent)showZoneLabel(s.label);
}
function nextStage(){goToStage(tourIndex+1);}
function prevStage(){goToStage(tourIndex-1);}
document.getElementById('tour-next').addEventListener('click',nextStage);
document.getElementById('tour-prev').addEventListener('click',prevStage);

// Scroll = one guided cinematic step, not a free-roam dolly
let lastWheelT=0;
canvas.addEventListener('wheel',e=>{
  if(overlay.classList.contains('open')||introActive)return;
  if(Math.abs(e.deltaY)<3)return;
  const now=performance.now();if(now-lastWheelT<850)return;lastWheelT=now;
  e.deltaY>0?nextStage():prevStage();
},{passive:true});

// Keyboard: PageUp/PageDown/Home/End/Enter and 1-7 quick jump (keyboard & TV remote friendly)
document.addEventListener('keydown',e=>{
  if(overlay.classList.contains('open')||introActive)return;
  if(e.code==='PageDown'){e.preventDefault();nextStage();}
  else if(e.code==='PageUp'){e.preventDefault();prevStage();}
  else if(e.code==='Home'){e.preventDefault();goToStage(0);}
  else if(e.code==='End'){e.preventDefault();goToStage(TOUR.length-1);}
  else if(e.code==='Enter'){nextStage();}
  else{const n=parseInt(e.key,10);if(!isNaN(n)&&n>=1&&n<=TOUR.length)goToStage(n-1);}
});

// Touch swipe = one guided cinematic step
let swX0=0,swY0=0,swT0=0;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){const t=e.touches[0];swX0=t.clientX;swY0=t.clientY;swT0=performance.now();}},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(overlay.classList.contains('open')||introActive)return;
  const t=e.changedTouches[0];if(!t)return;
  const dx=t.clientX-swX0,dy=t.clientY-swY0,dt=performance.now()-swT0;
  if(dt<650&&Math.abs(dy)>70&&Math.abs(dy)>Math.abs(dx)*1.3){dy<0?nextStage():prevStage();}
},{passive:true});

// ====================================================
//  CINEMATIC INTRO
// ====================================================
let introT=0;const INTRO_DUR=5.5;let introActive=true,introPhase=0;
const il1=document.getElementById('il1'),il2=document.getElementById('il2');
function eO4(p){return 1-Math.pow(1-p,4);}function eO2(p){return 1-Math.pow(1-p,2);}
function stepIntro(dt){
  introT+=dt;const p=Math.min(introT/INTRO_DUR,1);
  const p1=Math.min(p/.4,1),p2=Math.max((p-.4)/.6,0);const e1=eO2(p1),e2=eO4(p2);
  if(p<.4){tPos.x=2.1*(1-e1);tPos.z=5.2+(3.8-5.2)*e1;tPos.y=2.4+(1.9-2.4)*e1;tYaw=(Math.PI-.35)+.2*e1;tPitch=-.14+.08*e1;}
  else{tPos.x=0;tPos.z=3.8+(3.0-3.8)*e2;tPos.y=1.9+(1.62-1.9)*e2;tYaw=(Math.PI-.15)+.15*e2;tPitch=-.06+.03*e2;}
  if(introT>.55&&introPhase===0){introPhase=1;il1.classList.add('show');il2.classList.add('show');}
  if(introT>3.4&&introPhase===1){introPhase=2;il1.classList.add('gone');il2.classList.add('gone');}
  if(introT>=INTRO_DUR){
    introActive=false;tPos.set(0,1.62,2.0);tYaw=Math.PI;tPitch=-.03;
    document.getElementById('hud').classList.add('show');document.getElementById('toplogo').classList.add('show');xhairEl.classList.add('show');
    document.getElementById('tour-panel').classList.add('show');
    document.getElementById('tour-chips').classList.add('show');
    document.getElementById('tour-nav').classList.add('show');
    goToStage(0,{silent:true});
    const hintEl=document.getElementById('hint-arrow');hintEl.classList.add('show');setTimeout(()=>hintEl.classList.remove('show'),9000);
  }
}

// ====================================================
//  ANIMATIONS
// ====================================================
function animParticles(t){
  const pos=pGeo.attributes.position.array;
  for(let i=0;i<PCOUNT;i++){pos[i*3]+=pVel[i*3]+Math.sin(t*.18+i*.48)*.0003;pos[i*3+1]+=pVel[i*3+1];pos[i*3+2]+=pVel[i*3+2]+Math.cos(t*.14+i*.38)*.00022;if(pos[i*3+1]>3.4){pos[i*3+1]=.1;pos[i*3]=rnd(-4,4);pos[i*3+2]=rnd(-6.2,6.0);}if(pos[i*3]<-4.2||pos[i*3]>4.2)pVel[i*3]*=-1;}
  pGeo.attributes.position.needsUpdate=true;
}
function animLights(t){
  deskPt.intensity=1.88+Math.sin(t*1.1)*.14;tvPt.intensity=.72+Math.sin(t*.7)*.12;
  bedPt.intensity=.92+Math.sin(t*1.6)*.08;mainPt.intensity=2.1+Math.sin(t*.4)*.07;
  deskPend.intensity=.88+Math.sin(t*.95+.8)*.1;dlPt.intensity=.58+Math.sin(t*2.2)*.32;
  doorPt.intensity=.42+Math.sin(t*.6+1.2)*.1;flPt.intensity=.72+Math.sin(t*1.4+.5)*.1;
  shelfPt.intensity=1.05+Math.sin(t*.55+.3)*.12;winDir.intensity=.58+Math.sin(t*.22)*.09;
  const now=new Date();const hr=now.getHours()%12+now.getMinutes()/60;const mn=now.getMinutes()+now.getSeconds()/60;const sc=now.getSeconds()+now.getMilliseconds()/1000;
  hrHand.rotation.x=-(hr/12)*Math.PI*2;mnHand.rotation.x=-(mn/60)*Math.PI*2;scHand.rotation.x=-(sc/60)*Math.PI*2;
}
function animStudent(t){
  if(studentModel){
    // Faint seated sway — the whole body rocks very slightly, like someone reading, breathing
    studentModel.rotation.y=Math.PI+Math.sin(t*.3)*.012;
  }
  // Open book page settles with a faint flutter, like breath disturbing paper
  if(pgMesh)pgMesh.rotation.z=Math.sin(t*1.7)*.006;
}
function animBooks(t){
  allBookMeshes.forEach(m=>{
    const isHov=(m===hovMesh);
    const targetZ=(m.userData.baseZ||0)+(isHov?.05:0);
    m.position.z+=(targetZ-m.position.z)*.16;
    const ts=isHov?1.03:1.0;m.scale.y+=(ts-m.scale.y)*.1;
  });
}
function animDrawers(){
  drawerGroups.forEach((dg,i)=>{const targetZ=drawerOpen[i]?.38:0;drawerCurZ[i]+=(targetZ-drawerCurZ[i])*.12;dg.position.z=drawerCurZ[i];});
}
function animAmbient(t){
  // Screens breathe with a faint glow, like real backlit displays
  lapScrM.emissiveIntensity=1.65+Math.sin(t*1.3)*.1;
  tvSM.emissiveIntensity=1.9+Math.sin(t*.9+.4)*.12;
  phScrM.emissiveIntensity=1.25+Math.sin(t*1.6+1.1)*.08;
  // Dust motes twinkle faintly instead of a flat opacity
  dustPointsMat.opacity=.32+Math.sin(t*.6)*.05;
  // Shelf plant leaves sway very slightly, like faint air movement
  shelfLeaves.forEach(lf=>{lf.rotation.z=lf.userData.baseRotZ+Math.sin(t*.6+lf.userData.ph)*.035;});
  // Ceiling stars twinkle independently, like a real night sky
  ceilingStars.forEach(s=>{s.material.opacity=s.userData.baseOp*(.6+Math.sin(t*1.8+s.userData.ph)*.4);});
  // The solar-system mural's sun breathes with a slow glow
  muralMat.emissiveIntensity=1.1+Math.sin(t*.5)*.15;
}

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

// ====================================================
//  RENDER LOOP
// ====================================================
let lastT=0;
function render(now){
  requestAnimationFrame(render);const dt=Math.min((now-lastT)/1000,.05);lastT=now;const t=now*.001;
  if(introActive)stepIntro(dt);else doMove();
  const inFlight=!!window._flyTarget;
  cPos.lerp(tPos,inFlight?.06:.09);cYaw+=(tYaw-cYaw)*(inFlight?.07:.1);cPitch+=(tPitch-cPitch)*(inFlight?.07:.1);
  const moving=!introActive&&(keys.KeyW||keys.KeyS||keys.KeyA||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight||(jActive&&(Math.abs(jDX)>4||Math.abs(jDY)>4)));
  camera.position.copy(cPos);camera.position.y+=moving?Math.sin(t*5.2)*.013:0;
  const cp=Math.cos(cPitch);camera.lookAt(cPos.x+Math.sin(cYaw)*cp,cPos.y+Math.sin(cPitch),cPos.z+Math.cos(cYaw)*cp);
  animParticles(t);animLights(t);animBooks(t);animDrawers();animStudent(t);animAmbient(t);
  scene.fog.density=.021+cPos.distanceTo(tPos)*.004;
  renderer.render(scene,camera);
}

// ====================================================
//  LOADER
// ====================================================
const ldBar=document.getElementById('ld-bar'),ldMsg=document.getElementById('ld-msg');
const msgs=['Preparing your room\u2026','Placing the books\u2026','Warming the lights\u2026','Almost there\u2026'];
let lp=0,lmi=0;
const ldi=setInterval(()=>{
  lp=Math.min(lp+rnd(2,14),100);ldBar.style.width=lp+'%';
  if(lp>22&&lmi<1){lmi=1;ldMsg.textContent=msgs[1];}if(lp>52&&lmi<2){lmi=2;ldMsg.textContent=msgs[2];}if(lp>80&&lmi<3){lmi=3;ldMsg.textContent=msgs[3];}
  if(lp>=100){clearInterval(ldi);setTimeout(()=>{document.getElementById('loader').classList.add('out');setTimeout(()=>document.getElementById('loader').style.display='none',1700);},380);}
},72);
requestAnimationFrame(render);
</script>
